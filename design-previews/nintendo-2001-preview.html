<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>刷个冯题 - Nintendo 2001 设计方案</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Trebuchet MS', 'Arial Black', sans-serif; background-color: #21242e; color: #c8c8d0; min-height: 100vh; max-width: 375px; margin: 0 auto; overflow-x: hidden; }
    .hero { padding: 48px 16px; text-align: center; background: linear-gradient(180deg, #8b7fb8 0%, #6b5fa0 100%); border-bottom: 4px solid #4a4080; position: relative; }
    .hero::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: #b8b0e0; }
    .hero h1 { font-size: 32px; font-weight: 900; color: #ffffff; margin-bottom: 8px; text-transform: uppercase; text-shadow: 2px 2px 0 #4a4080; }
    .hero p { font-size: 14px; color: #d0c8f0; margin-bottom: 16px; }
    .btn-primary { display: inline-block; background-color: #ff8c00; color: #000000; border: none; border-radius: 0; padding: 12px 24px; font-size: 14px; font-weight: 900; cursor: pointer; text-transform: uppercase; border-bottom: 3px solid #cc7000; }
    .stats-bar { display: flex; justify-content: space-around; padding: 16px; background-color: #2a2d3a; border-top: 2px solid #3a3d4a; border-bottom: 2px solid #3a3d4a; }
    .stat-item { text-align: center; }
    .stat-item .value { font-size: 20px; font-weight: 900; color: #ffd700; }
    .stat-item .label { font-size: 10px; color: #8b8b9a; margin-top: 2px; text-transform: uppercase; }
    .section { padding: 24px 16px; background-color: #21242e; }
    .section-title { font-size: 20px; font-weight: 900; color: #ffffff; margin-bottom: 16px; text-transform: uppercase; text-shadow: 1px 1px 0 #000; }
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab { flex-shrink: 0; padding: 8px 12px; font-size: 11px; font-weight: 700; cursor: pointer; background-color: #3a3d4a; color: #ffd700; text-transform: uppercase; border: 1px solid #4a4d5a; }
    .tab.active { background-color: #ff8c00; color: #000; border-color: #cc7000; }
    .tools-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .tool-card { background: linear-gradient(180deg, #8b7fb8 0%, #6b5fa0 100%); border-radius: 0; padding: 16px; cursor: pointer; border-top: 2px solid #b8b0e0; border-left: 2px solid #b8b0e0; border-bottom: 2px solid #4a4080; border-right: 2px solid #4a4080; }
    .tool-card:hover { background: linear-gradient(180deg, #9b8fc8 0%, #7b6fb0 100%); }
    .tool-card .icon { font-size: 24px; margin-bottom: 8px; display: block; }
    .tool-card .name { font-size: 14px; font-weight: 900; color: #ffffff; margin-bottom: 4px; text-transform: uppercase; text-shadow: 1px 1px 0 #000; }
    .tool-card .desc { font-size: 11px; color: #d0c8f0; }
    .tool-card .badge { display: inline-block; background-color: #ff8c00; color: #000; padding: 2px 8px; font-size: 9px; font-weight: 900; margin-top: 6px; text-transform: uppercase; }
    .quick-actions { padding: 0 16px 24px; background-color: #21242e; }
    .action-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background-color: #2a2d3a; margin-bottom: 4px; cursor: pointer; border-left: 3px solid #ffd700; }
    .action-item .left { display: flex; align-items: center; gap: 8px; }
    .action-item .icon { font-size: 18px; }
    .action-item .text { font-size: 14px; font-weight: 700; color: #ffd700; text-transform: uppercase; }
    .action-item .arrow { color: #8b8b9a; font-size: 16px; }
    .footer { text-align: center; padding: 16px; font-size: 10px; color: #8b8b9a; background-color: #1a1d26; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="hero"><h1>刷个冯题</h1><p>你的 CS 学习工具箱</p><button class="btn-primary">开始刷题</button></div>
  <div class="stats-bar"><div class="stat-item"><div class="value">328</div><div class="label">累计刷题</div></div><div class="stat-item"><div class="value">47</div><div class="label">练习次数</div></div><div class="stat-item"><div class="value">82%</div><div class="label">正确率</div></div><div class="stat-item"><div class="value">12</div><div class="label">错题数</div></div></div>
  <div class="section"><h2 class="section-title">工具箱</h2><div class="tabs"><div class="tab active">全部工具</div><div class="tab">计算机网络</div><div class="tab">算法&数据结构</div></div><div class="tools-grid"><div class="tool-card"><span class="icon">🌐</span><div class="name">子网计算器</div><div class="desc">快速计算子网划分</div></div><div class="tool-card"><span class="icon">🔗</span><div class="name">TCP 动画机</div><div class="desc">可视化 TCP 连接过程</div></div><div class="tool-card"><span class="icon">📊</span><div class="name">排序可视化</div><div class="desc">直观理解排序算法</div></div><div class="tool-card"><span class="icon">🌲</span><div class="name">数据结构可视化</div><div class="desc">BST、栈、队列等</div></div><div class="tool-card"><span class="icon">📈</span><div class="name">学习驾驶舱</div><div class="desc">学习进度一目了然</div></div><div class="tool-card"><span class="icon">📝</span><div class="name">单词记忆</div><div class="desc">CS 专业词汇速记</div><span class="badge">即将上线</span></div></div></div>
  <div class="quick-actions"><div class="action-item"><div class="left"><span class="icon">📋</span><span class="text">答题记录</span></div><span class="arrow">→</span></div><div class="action-item"><div class="left"><span class="icon">❌</span><span class="text">错题本</span></div><span class="arrow">→</span></div></div>
  <div class="footer">设计方案基于 Nintendo 2001 设计语言 · 仅供预览</div>
</body>
</html>
