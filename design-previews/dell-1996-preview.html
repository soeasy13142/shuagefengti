<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>刷个冯题 - Dell 1996 设计方案</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Times New Roman', Times, serif;
      background-color: #ffffff;
      color: #000000;
      min-height: 100vh;
      max-width: 375px;
      margin: 0 auto;
      border: 8px solid #000000;
    }
    .hero {
      padding: 32px 16px;
      text-align: center;
      background-color: #ffffff;
      border-bottom: 3px solid #000000;
    }
    .hero h1 {
      font-family: 'Arial Black', Arial, sans-serif;
      font-size: 32px;
      font-weight: 900;
      color: #000000;
      margin-bottom: 8px;
    }
    .hero .sticker {
      display: inline-block;
      background-color: #fcc20f;
      color: #000000;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 900;
      font-family: Arial, sans-serif;
      margin-bottom: 12px;
      border: 2px solid #000000;
    }
    .hero p {
      font-size: 14px;
      color: #000000;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .btn-primary {
      display: inline-block;
      background-color: #e91d2a;
      color: #ffffff;
      border: 2px solid #000000;
      border-radius: 0;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      font-family: Arial, sans-serif;
      text-transform: uppercase;
    }
    .stats-bar {
      display: flex;
      justify-content: space-around;
      padding: 16px;
      background-color: #f0f0f0;
      border-bottom: 2px solid #000000;
    }
    .stat-item {
      text-align: center;
    }
    .stat-item .value {
      font-family: 'Arial Black', Arial, sans-serif;
      font-size: 20px;
      font-weight: 900;
      color: #000000;
    }
    .stat-item .label {
      font-size: 10px;
      color: #000000;
      margin-top: 2px;
      font-family: Arial, sans-serif;
      text-transform: uppercase;
    }
    .section {
      padding: 16px;
      border-bottom: 2px solid #000000;
    }
    .section-title {
      font-family: 'Arial Black', Arial, sans-serif;
      font-size: 24px;
      font-weight: 900;
      color: #000000;
      margin-bottom: 16px;
      border-bottom: 2px solid #000000;
      padding-bottom: 8px;
    }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .tab {
      padding: 6px 12px;
      border: 2px solid #000000;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      font-family: Arial, sans-serif;
      text-transform: uppercase;
      background-color: #ffffff;
    }
    .tab.active {
      background-color: #000000;
      color: #ffffff;
    }
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0;
      border: 2px solid #000000;
    }
    .tool-card {
      padding: 16px;
      border: 1px solid #000000;
      cursor: pointer;
    }
    .tool-card:nth-child(1) { background-color: #8e8a25; }
    .tool-card:nth-child(2) { background-color: #b3bd95; }
    .tool-card:nth-child(3) { background-color: #d77a7a; }
    .tool-card:nth-child(4) { background-color: #e6915d; }
    .tool-card:nth-child(5) { background-color: #c0d4a7; }
    .tool-card:nth-child(6) { background-color: #87ceeb; }
    .tool-card .icon {
      font-size: 24px;
      margin-bottom: 8px;
      display: block;
    }
    .tool-card .name {
      font-family: 'Helvetica', Arial, sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #000000;
      margin-bottom: 4px;
    }
    .tool-card .desc {
      font-size: 12px;
      color: #000000;
      line-height: 1.3;
    }
    .tool-card .badge {
      display: inline-block;
      background-color: #fcc20f;
      color: #000000;
      border: 1px solid #000000;
      padding: 2px 6px;
      font-size: 9px;
      font-weight: 900;
      margin-top: 6px;
      font-family: Arial, sans-serif;
      text-transform: uppercase;
    }
    .quick-actions {
      padding: 16px;
      border-bottom: 2px solid #000000;
    }
    .action-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background-color: #f0f0f0;
      border: 2px solid #000000;
      margin-bottom: 8px;
      cursor: pointer;
    }
    .action-item .left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .action-item .icon {
      font-size: 18px;
    }
    .action-item .text {
      font-family: 'Helvetica', Arial, sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #000000;
    }
    .action-item .arrow {
      color: #000000;
      font-size: 16px;
    }
    .footer {
      text-align: center;
      padding: 16px;
      font-size: 10px;
      color: #000000;
      font-family: Arial, sans-serif;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <!-- Hero Section -->
  <div class="hero">
    <div class="sticker">★ NEW! ★</div>
    <h1>刷个冯题</h1>
    <p>你的 CS 学习工具箱</p>
    <button class="btn-primary">BUY a DELL - 开始刷题</button>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-item">
      <div class="value">328</div>
      <div class="label">累计刷题</div>
    </div>
    <div class="stat-item">
      <div class="value">47</div>
      <div class="label">练习次数</div>
    </div>
    <div class="stat-item">
      <div class="value">82%</div>
      <div class="label">正确率</div>
    </div>
    <div class="stat-item">
      <div class="value">12</div>
      <div class="label">错题数</div>
    </div>
  </div>

  <!-- Toolbox Section -->
  <div class="section">
    <h2 class="section-title">工具箱</h2>
    <div class="tabs">
      <div class="tab active">全部工具</div>
      <div class="tab">计算机网络</div>
      <div class="tab">算法&数据结构</div>
    </div>
    <div class="tools-grid">
      <div class="tool-card">
        <span class="icon">🌐</span>
        <div class="name">子网计算器</div>
        <div class="desc">快速计算子网划分</div>
      </div>
      <div class="tool-card">
        <span class="icon">🔗</span>
        <div class="name">TCP 动画机</div>
        <div class="desc">可视化 TCP 连接过程</div>
      </div>
      <div class="tool-card">
        <span class="icon">📊</span>
        <div class="name">排序可视化</div>
        <div class="desc">直观理解排序算法</div>
      </div>
      <div class="tool-card">
        <span class="icon">🌲</span>
        <div class="name">数据结构可视化</div>
        <div class="desc">BST、栈、队列等</div>
      </div>
      <div class="tool-card">
        <span class="icon">📈</span>
        <div class="name">学习驾驶舱</div>
        <div class="desc">学习进度一目了然</div>
      </div>
      <div class="tool-card">
        <span class="icon">📝</span>
        <div class="name">单词记忆</div>
        <div class="desc">CS 专业词汇速记</div>
        <span class="badge">★ NEW! ★</span>
      </div>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="quick-actions">
    <div class="action-item">
      <div class="left">
        <span class="icon">📋</span>
        <span class="text">答题记录</span>
      </div>
      <span class="arrow">→</span>
    </div>
    <div class="action-item">
      <div class="left">
        <span class="icon">❌</span>
        <span class="text">错题本</span>
      </div>
      <span class="arrow">→</span>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    设计方案基于 Dell 1996 设计语言 · 仅供预览
  </div>
</body>
</html>
