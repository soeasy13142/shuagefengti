<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>刷个冯题 - Claude Design 设计方案</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Georgia, 'Times New Roman', serif;
      background-color: #faf9f5;
      color: #141413;
      min-height: 100vh;
      max-width: 375px;
      margin: 0 auto;
      overflow-x: hidden;
    }
    .hero {
      padding: 96px 48px;
      text-align: center;
      background-color: #faf9f5;
    }
    .hero h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 48px;
      font-weight: 400;
      color: #141413;
      margin-bottom: 16px;
      letter-spacing: -3px;
      line-height: 1.1;
    }
    .hero p {
      font-size: 16px;
      color: #6c6a64;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .btn-primary {
      display: inline-block;
      background-color: #cc785c;
      color: #faf9f5;
      border: none;
      border-radius: 24px;
      padding: 16px 32px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .btn-primary:hover {
      background-color: #a9583e;
    }
    .btn-secondary {
      display: inline-block;
      background-color: #faf9f5;
      color: #141413;
      border: 2px solid #e6dfd8;
      border-radius: 24px;
      padding: 16px 32px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-left: 12px;
    }
    .btn-secondary:hover {
      background-color: #efe9de;
    }
    .stats-bar {
      display: flex;
      justify-content: space-around;
      padding: 32px 16px;
      background-color: #efe9de;
    }
    .stat-item {
      text-align: center;
    }
    .stat-item .value {
      font-family: 'Courier New', monospace;
      font-size: 28px;
      font-weight: 700;
      color: #cc785c;
    }
    .stat-item .label {
      font-size: 12px;
      color: #6c6a64;
      margin-top: 4px;
    }
    .section {
      padding: 48px 16px;
      background-color: #faf9f5;
    }
    .section-title {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 32px;
      font-weight: 400;
      color: #141413;
      margin-bottom: 24px;
      letter-spacing: -2px;
    }
    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      overflow-x: auto;
      padding-bottom: 8px;
    }
    .tab {
      flex-shrink: 0;
      padding: 10px 20px;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      background-color: #efe9de;
      color: #141413;
    }
    .tab.active {
      background-color: #cc785c;
      color: #faf9f5;
    }
    .tab:hover:not(.active) {
      background-color: #e6dfd8;
    }
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    .tool-card {
      background-color: #efe9de;
      border-radius: 24px;
      padding: 32px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tool-card:hover {
      background-color: #e6dfd8;
    }
    .tool-card .icon {
      font-size: 36px;
      margin-bottom: 16px;
      display: block;
    }
    .tool-card .name {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 20px;
      font-weight: 400;
      color: #141413;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }
    .tool-card .desc {
      font-size: 14px;
      color: #6c6a64;
      line-height: 1.6;
    }
    .tool-card .badge {
      display: inline-block;
      background-color: #cc785c;
      color: #faf9f5;
      border-radius: 9999px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 12px;
    }
    .dark-card {
      background-color: #181715;
      border-radius: 24px;
      padding: 40px;
      margin: 32px 16px;
      text-align: center;
    }
    .dark-card h2 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 28px;
      font-weight: 400;
      color: #faf9f5;
      margin-bottom: 8px;
      letter-spacing: -2px;
    }
    .dark-card p {
      font-size: 14px;
      color: #a09d96;
    }
    .quick-actions {
      padding: 0 16px 32px;
      background-color: #faf9f5;
    }
    .action-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      background-color: #efe9de;
      border-radius: 24px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-item:hover {
      background-color: #e6dfd8;
    }
    .action-item .left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .action-item .icon {
      font-size: 24px;
    }
    .action-item .text {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 18px;
      font-weight: 400;
      color: #141413;
    }
    .action-item .arrow {
      color: #6c6a64;
      font-size: 20px;
    }
    .footer {
      text-align: center;
      padding: 32px 16px;
      font-size: 12px;
      color: #a09d96;
      background-color: #181715;
    }
  </style>
</head>
<body>
  <!-- Hero Section -->
  <div class="hero">
    <h1>刷个冯题</h1>
    <p>你的 CS 学习工具箱</p>
    <button class="btn-primary">开始刷题</button>
    <button class="btn-secondary">了解更多</button>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-item">
      <div class="value">328</div>
      <div class="label">累计刷题</div>
    </div>
    <div class="stat-item">
      <div class="value">47</div>
      <div class="label">练习次数</div>
    </div>
    <div class="stat-item">
      <div class="value">82%</div>
      <div class="label">正确率</div>
    </div>
    <div class="stat-item">
      <div class="value">12</div>
      <div class="label">错题数</div>
    </div>
  </div>

  <!-- Toolbox Section -->
  <div class="section">
    <h2 class="section-title">工具箱</h2>
    <div class="tabs">
      <div class="tab active">全部工具</div>
      <div class="tab">计算机网络</div>
      <div class="tab">算法&数据结构</div>
    </div>
    <div class="tools-grid">
      <div class="tool-card">
        <span class="icon">🌐</span>
        <div class="name">子网计算器</div>
        <div class="desc">快速计算子网划分</div>
      </div>
      <div class="tool-card">
        <span class="icon">🔗</span>
        <div class="name">TCP 动画机</div>
        <div class="desc">可视化 TCP 连接过程</div>
      </div>
      <div class="tool-card">
        <span class="icon">📊</span>
        <div class="name">排序可视化</div>
        <div class="desc">直观理解排序算法</div>
      </div>
      <div class="tool-card">
        <span class="icon">🌲</span>
        <div class="name">数据结构可视化</div>
        <div class="desc">BST、栈、队列等</div>
      </div>
      <div class="tool-card">
        <span class="icon">📈</span>
        <div class="name">学习驾驶舱</div>
        <div class="desc">学习进度一目了然</div>
      </div>
      <div class="tool-card">
        <span class="icon">📝</span>
        <div class="name">单词记忆</div>
        <div class="desc">CS 专业词汇速记</div>
        <span class="badge">即将上线</span>
      </div>
    </div>
  </div>

  <!-- Dark Card -->
  <div class="dark-card">
    <h2>高效学习</h2>
    <p>通过可视化工具深入理解计算机科学概念</p>
  </div>

  <!-- Quick Actions -->
  <div class="quick-actions">
    <div class="action-item">
      <div class="left">
        <span class="icon">📋</span>
        <span class="text">答题记录</span>
      </div>
      <span class="arrow">→</span>
    </div>
    <div class="action-item">
      <div class="left">
        <span class="icon">❌</span>
        <span class="text">错题本</span>
      </div>
      <span class="arrow">→</span>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    设计方案基于 Claude Design 设计语言 · 仅供预览
  </div>
</body>
</html>
