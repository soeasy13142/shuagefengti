<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>刷个冯题 - HashiCorp 设计方案</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #000000;
      color: #ffffff;
      min-height: 100vh;
      max-width: 375px;
      margin: 0 auto;
      overflow-x: hidden;
    }
    .hero { padding: 80px 32px; text-align: center; background-color: #000000; }
    .hero h1 { font-size: 40px; font-weight: 600; color: #ffffff; margin-bottom: 12px; letter-spacing: -0.5px; line-height: 1.17; }
    .hero p { font-size: 16px; color: #b2b6bd; margin-bottom: 24px; line-height: 1.5; }
    .btn-primary { display: inline-block; background-color: #ffffff; color: #000000; border: none; border-radius: 8px; padding: 14px 28px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background-color 0.2s; }
    .btn-primary:hover { background-color: #e6e6e6; }
    .stats-bar { display: flex; justify-content: space-around; padding: 24px 16px; background-color: #15181e; }
    .stat-item { text-align: center; }
    .stat-item .value { font-size: 24px; font-weight: 700; color: #ffffff; }
    .stat-item .label { font-size: 12px; color: #b2b6bd; margin-top: 4px; }
    .section { padding: 48px 16px; background-color: #000000; }
    .section-title { font-size: 28px; font-weight: 600; color: #ffffff; margin-bottom: 20px; }
    .tabs { display: flex; gap: 12px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 8px; }
    .tab { flex-shrink: 0; padding: 10px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; background-color: #15181e; color: #b2b6bd; text-transform: uppercase; letter-spacing: 0.6px; }
    .tab.active { background-color: #ffffff; color: #000000; }
    .tab:hover:not(.active) { background-color: #1f232b; }
    .tools-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .tool-card { background-color: #15181e; border-radius: 8px; padding: 20px; cursor: pointer; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); }
    .tool-card:hover { background-color: #1f232b; }
    .tool-card .icon { font-size: 32px; margin-bottom: 12px; display: block; }
    .tool-card .name { font-size: 16px; font-weight: 600; color: #ffffff; margin-bottom: 4px; }
    .tool-card .desc { font-size: 14px; color: #b2b6bd; line-height: 1.4; }
    .product-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; vertical-align: middle; }
    .dot-purple { background-color: #7b42bc; }
    .dot-yellow { background-color: #ffd700; }
    .dot-red { background-color: #e03e3e; }
    .dot-cyan { background-color: #00d4ff; }
    .dot-blue { background-color: #2c78d4; }
    .dot-green { background-color: #22c55e; }
    .tool-card .badge { display: inline-block; background-color: #ffffff; color: #000000; border-radius: 8px; padding: 4px 10px; font-size: 11px; font-weight: 600; margin-top: 8px; }
    .quick-actions { padding: 0 16px 32px; background-color: #000000; }
    .action-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background-color: #15181e; border-radius: 8px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); }
    .action-item:hover { background-color: #1f232b; }
    .action-item .left { display: flex; align-items: center; gap: 12px; }
    .action-item .icon { font-size: 24px; }
    .action-item .text { font-size: 16px; font-weight: 500; color: #ffffff; }
    .action-item .arrow { color: #b2b6bd; font-size: 20px; }
    .footer { text-align: center; padding: 24px 16px; font-size: 12px; color: #656a76; background-color: #15181e; border-top: 1px solid rgba(255,255,255,0.1); }
  </style>
</head>
<body>
  <div class="hero">
    <h1>刷个冯题</h1>
    <p>你的 CS 学习工具箱</p>
    <button class="btn-primary">开始刷题</button>
  </div>
  <div class="stats-bar">
    <div class="stat-item"><div class="value">328</div><div class="label">累计刷题</div></div>
    <div class="stat-item"><div class="value">47</div><div class="label">练习次数</div></div>
    <div class="stat-item"><div class="value">82%</div><div class="label">正确率</div></div>
    <div class="stat-item"><div class="value">12</div><div class="label">错题数</div></div>
  </div>
  <div class="section">
    <h2 class="section-title">工具箱</h2>
    <div class="tabs">
      <div class="tab active">全部工具</div>
      <div class="tab">计算机网络</div>
      <div class="tab">算法&数据结构</div>
    </div>
    <div class="tools-grid">
      <div class="tool-card"><span class="icon">🌐</span><div class="name"><span class="product-dot dot-purple"></span>子网计算器</div><div class="desc">快速计算子网划分</div></div>
      <div class="tool-card"><span class="icon">🔗</span><div class="name"><span class="product-dot dot-yellow"></span>TCP 动画机</div><div class="desc">可视化 TCP 连接过程</div></div>
      <div class="tool-card"><span class="icon">📊</span><div class="name"><span class="product-dot dot-red"></span>排序可视化</div><div class="desc">直观理解排序算法</div></div>
      <div class="tool-card"><span class="icon">🌲</span><div class="name"><span class="product-dot dot-cyan"></span>数据结构可视化</div><div class="desc">BST、栈、队列等</div></div>
      <div class="tool-card"><span class="icon">📈</span><div class="name"><span class="product-dot dot-green"></span>学习驾驶舱</div><div class="desc">学习进度一目了然</div></div>
      <div class="tool-card"><span class="icon">📝</span><div class="name"><span class="product-dot dot-blue"></span>单词记忆</div><div class="desc">CS 专业词汇速记</div><span class="badge">即将上线</span></div>
    </div>
  </div>
  <div class="quick-actions">
    <div class="action-item"><div class="left"><span class="icon">📋</span><span class="text">答题记录</span></div><span class="arrow">→</span></div>
    <div class="action-item"><div class="left"><span class="icon">❌</span><span class="text">错题本</span></div><span class="arrow">→</span></div>
  </div>
  <div class="footer">设计方案基于 HashiCorp 设计语言 · 仅供预览</div>
</body>
</html>
