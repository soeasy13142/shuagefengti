<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>刷个冯题 - Clay 设计方案</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #fffaf0;
      color: #0a0a0a;
      min-height: 100vh;
      max-width: 375px;
      margin: 0 auto;
      overflow-x: hidden;
    }
    .hero {
      padding: 80px 32px;
      text-align: center;
      background-color: #fffaf0;
    }
    .hero h1 {
      font-size: 40px;
      font-weight: 500;
      color: #0a0a0a;
      margin-bottom: 12px;
      letter-spacing: -1px;
    }
    .hero p {
      font-size: 16px;
      color: #666666;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .btn-primary {
      display: inline-block;
      background-color: #0a0a0a;
      color: #ffffff;
      border: none;
      border-radius: 12px;
      padding: 14px 28px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .btn-primary:hover {
      background-color: #222222;
    }
    .stats-bar {
      display: flex;
      justify-content: space-around;
      padding: 24px 16px;
      background-color: #f5f0e0;
    }
    .stat-item {
      text-align: center;
    }
    .stat-item .value {
      font-size: 24px;
      font-weight: 700;
      color: #0a0a0a;
    }
    .stat-item .label {
      font-size: 12px;
      color: #666666;
      margin-top: 4px;
    }
    .section {
      padding: 48px 16px;
      background-color: #fffaf0;
    }
    .section-title {
      font-size: 28px;
      font-weight: 500;
      color: #0a0a0a;
      margin-bottom: 20px;
      letter-spacing: -0.5px;
    }
    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      overflow-x: auto;
      padding-bottom: 8px;
    }
    .tab {
      flex-shrink: 0;
      padding: 10px 16px;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background-color: #f5f0e0;
      color: #0a0a0a;
    }
    .tab.active {
      background-color: #0a0a0a;
      color: #ffffff;
    }
    .tab:hover:not(.active) {
      background-color: #e8e0d0;
    }
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    .tool-card {
      border-radius: 24px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tool-card:nth-child(1) { background-color: #ff4d8b; color: #ffffff; }
    .tool-card:nth-child(2) { background-color: #1a3a3a; color: #ffffff; }
    .tool-card:nth-child(3) { background-color: #b8a4ed; color: #0a0a0a; }
    .tool-card:nth-child(4) { background-color: #ffb084; color: #0a0a0a; }
    .tool-card:nth-child(5) { background-color: #e8b94a; color: #0a0a0a; }
    .tool-card:nth-child(6) { background-color: #a4d4c5; color: #0a0a0a; }
    .tool-card:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }
    .tool-card .icon {
      font-size: 32px;
      margin-bottom: 12px;
      display: block;
    }
    .tool-card .name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .tool-card .desc {
      font-size: 14px;
      line-height: 1.4;
      opacity: 0.8;
    }
    .tool-card .badge {
      display: inline-block;
      background-color: rgba(255,255,255,0.3);
      color: inherit;
      border-radius: 9999px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      margin-top: 8px;
    }
    .quick-actions {
      padding: 0 16px 32px;
      background-color: #fffaf0;
    }
    .action-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background-color: #f5f0e0;
      border-radius: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-item:hover {
      background-color: #e8e0d0;
    }
    .action-item .left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .action-item .icon {
      font-size: 24px;
    }
    .action-item .text {
      font-size: 16px;
      font-weight: 600;
      color: #0a0a0a;
    }
    .action-item .arrow {
      color: #666666;
      font-size: 20px;
    }
    .footer {
      text-align: center;
      padding: 24px 16px;
      font-size: 12px;
      color: #666666;
      background-color: #f5f0e0;
    }
  </style>
</head>
<body>
  <!-- Hero Section -->
  <div class="hero">
    <h1>刷个冯题</h1>
    <p>你的 CS 学习工具箱</p>
    <button class="btn-primary">开始刷题</button>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-item">
      <div class="value">328</div>
      <div class="label">累计刷题</div>
    </div>
    <div class="stat-item">
      <div class="value">47</div>
      <div class="label">练习次数</div>
    </div>
    <div class="stat-item">
      <div class="value">82%</div>
      <div class="label">正确率</div>
    </div>
    <div class="stat-item">
      <div class="value">12</div>
      <div class="label">错题数</div>
    </div>
  </div>

  <!-- Toolbox Section -->
  <div class="section">
    <h2 class="section-title">工具箱</h2>
    <div class="tabs">
      <div class="tab active">全部工具</div>
      <div class="tab">计算机网络</div>
      <div class="tab">算法&数据结构</div>
    </div>
    <div class="tools-grid">
      <div class="tool-card">
        <span class="icon">🌐</span>
        <div class="name">子网计算器</div>
        <div class="desc">快速计算子网划分</div>
      </div>
      <div class="tool-card">
        <span class="icon">🔗</span>
        <div class="name">TCP 动画机</div>
        <div class="desc">可视化 TCP 连接过程</div>
      </div>
      <div class="tool-card">
        <span class="icon">📊</span>
        <div class="name">排序可视化</div>
        <div class="desc">直观理解排序算法</div>
      </div>
      <div class="tool-card">
        <span class="icon">🌲</span>
        <div class="name">数据结构可视化</div>
        <div class="desc">BST、栈、队列等</div>
      </div>
      <div class="tool-card">
        <span class="icon">📈</span>
        <div class="name">学习驾驶舱</div>
        <div class="desc">学习进度一目了然</div>
      </div>
      <div class="tool-card">
        <span class="icon">📝</span>
        <div class="name">单词记忆</div>
        <div class="desc">CS 专业词汇速记</div>
        <span class="badge">即将上线</span>
      </div>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="quick-actions">
    <div class="action-item">
      <div class="left">
        <span class="icon">📋</span>
        <span class="text">答题记录</span>
      </div>
      <span class="arrow">→</span>
    </div>
    <div class="action-item">
      <div class="left">
        <span class="icon">❌</span>
        <span class="text">错题本</span>
      </div>
      <span class="arrow">→</span>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    设计方案基于 Clay 设计语言 · 仅供预览
  </div>
</body>
</html>
