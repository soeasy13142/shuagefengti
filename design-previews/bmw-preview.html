<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>刷个冯题 - BMW 设计方案</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #ffffff;
      color: #262626;
      min-height: 100vh;
      max-width: 375px;
      margin: 0 auto;
      overflow-x: hidden;
    }
    .hero {
      padding: 80px 32px;
      text-align: center;
      background-color: #1a2129;
    }
    .hero h1 {
      font-size: 40px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 12px;
      letter-spacing: 0;
    }
    .hero p {
      font-size: 16px;
      color: #bbbbbb;
      margin-bottom: 24px;
      line-height: 1.5;
      font-weight: 300;
    }
    .btn-primary {
      display: inline-block;
      background-color: #1c69d4;
      color: #ffffff;
      border: none;
      border-radius: 0;
      padding: 14px 32px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .btn-primary:hover {
      background-color: #0653b6;
    }
    .btn-secondary {
      display: inline-block;
      background-color: transparent;
      color: #1c69d4;
      border: 1px solid #1c69d4;
      border-radius: 0;
      padding: 14px 32px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-left: 12px;
    }
    .btn-secondary:hover {
      background-color: #1c69d4;
      color: #ffffff;
    }
    .stats-bar {
      display: flex;
      justify-content: space-around;
      padding: 24px 16px;
      background-color: #f7f7f7;
    }
    .stat-item {
      text-align: center;
    }
    .stat-item .value {
      font-size: 24px;
      font-weight: 700;
      color: #262626;
    }
    .stat-item .label {
      font-size: 12px;
      color: #6b6b6b;
      margin-top: 4px;
    }
    .section {
      padding: 48px 16px;
      background-color: #ffffff;
    }
    .section-title {
      font-size: 28px;
      font-weight: 700;
      color: #262626;
      margin-bottom: 20px;
    }
    .tabs {
      display: flex;
      gap: 24px;
      margin-bottom: 20px;
      overflow-x: auto;
      padding-bottom: 8px;
    }
    .tab {
      flex-shrink: 0;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      color: #6b6b6b;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding-bottom: 8px;
      border-bottom: 2px solid transparent;
    }
    .tab.active {
      color: #262626;
      border-bottom-color: #262626;
    }
    .tab:hover:not(.active) {
      color: #262626;
    }
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    .tool-card {
      background-color: #fafafa;
      border-radius: 0;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tool-card:hover {
      background-color: #f7f7f7;
    }
    .tool-card .icon {
      font-size: 32px;
      margin-bottom: 12px;
      display: block;
    }
    .tool-card .name {
      font-size: 16px;
      font-weight: 700;
      color: #262626;
      margin-bottom: 4px;
    }
    .tool-card .desc {
      font-size: 14px;
      color: #6b6b6b;
      line-height: 1.4;
      font-weight: 300;
    }
    .tool-card .badge {
      display: inline-block;
      background-color: #1c69d4;
      color: #ffffff;
      border-radius: 0;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 700;
      margin-top: 8px;
      text-transform: uppercase;
    }
    .quick-actions {
      padding: 0 16px 32px;
      background-color: #ffffff;
    }
    .action-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background-color: #fafafa;
      border-radius: 0;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-item:hover {
      background-color: #f7f7f7;
    }
    .action-item .left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .action-item .icon {
      font-size: 24px;
    }
    .action-item .text {
      font-size: 16px;
      font-weight: 700;
      color: #262626;
    }
    .action-item .arrow {
      color: #6b6b6b;
      font-size: 20px;
    }
    .link-uppercase {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #1c69d4;
      text-decoration: none;
      display: inline-block;
      margin-top: 12px;
    }
    .link-uppercase::after {
      content: ' ›';
      margin-left: 4px;
    }
    .footer {
      text-align: center;
      padding: 24px 16px;
      font-size: 12px;
      color: #6b6b6b;
      background-color: #f7f7f7;
    }
  </style>
</head>
<body>
  <!-- Hero Section -->
  <div class="hero">
    <h1>刷个冯题</h1>
    <p>你的 CS 学习工具箱</p>
    <button class="btn-primary">开始刷题</button>
    <button class="btn-secondary">了解更多</button>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-item">
      <div class="value">328</div>
      <div class="label">累计刷题</div>
    </div>
    <div class="stat-item">
      <div class="value">47</div>
      <div class="label">练习次数</div>
    </div>
    <div class="stat-item">
      <div class="value">82%</div>
      <div class="label">正确率</div>
    </div>
    <div class="stat-item">
      <div class="value">12</div>
      <div class="label">错题数</div>
    </div>
  </div>

  <!-- Toolbox Section -->
  <div class="section">
    <h2 class="section-title">工具箱</h2>
    <div class="tabs">
      <div class="tab active">全部工具</div>
      <div class="tab">计算机网络</div>
      <div class="tab">算法&数据结构</div>
    </div>
    <div class="tools-grid">
      <div class="tool-card">
        <span class="icon">🌐</span>
        <div class="name">子网计算器</div>
        <div class="desc">快速计算子网划分</div>
        <a href="#" class="link-uppercase">了解更多</a>
      </div>
      <div class="tool-card">
        <span class="icon">🔗</span>
        <div class="name">TCP 动画机</div>
        <div class="desc">可视化 TCP 连接过程</div>
        <a href="#" class="link-uppercase">了解更多</a>
      </div>
      <div class="tool-card">
        <span class="icon">📊</span>
        <div class="name">排序可视化</div>
        <div class="desc">直观理解排序算法</div>
        <a href="#" class="link-uppercase">了解更多</a>
      </div>
      <div class="tool-card">
        <span class="icon">🌲</span>
        <div class="name">数据结构可视化</div>
        <div class="desc">BST、栈、队列等</div>
        <a href="#" class="link-uppercase">了解更多</a>
      </div>
      <div class="tool-card">
        <span class="icon">📈</span>
        <div class="name">学习驾驶舱</div>
        <div class="desc">学习进度一目了然</div>
        <a href="#" class="link-uppercase">了解更多</a>
      </div>
      <div class="tool-card">
        <span class="icon">📝</span>
        <div class="name">单词记忆</div>
        <div class="desc">CS 专业词汇速记</div>
        <span class="badge">即将上线</span>
      </div>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="quick-actions">
    <div class="action-item">
      <div class="left">
        <span class="icon">📋</span>
        <span class="text">答题记录</span>
      </div>
      <span class="arrow">→</span>
    </div>
    <div class="action-item">
      <div class="left">
        <span class="icon">❌</span>
        <span class="text">错题本</span>
      </div>
      <span class="arrow">→</span>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    设计方案基于 BMW 设计语言 · 仅供预览
  </div>
</body>
</html>
