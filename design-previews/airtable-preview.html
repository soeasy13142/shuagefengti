<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>刷个冯题 - Airtable 设计方案</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #ffffff;
      color: #333840;
      min-height: 100vh;
      max-width: 375px;
      margin: 0 auto;
      overflow-x: hidden;
    }
    .hero {
      padding: 48px 32px;
      text-align: center;
    }
    .hero h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 32px;
      font-weight: 400;
      color: #181d26;
      margin-bottom: 12px;
      letter-spacing: -1px;
    }
    .hero p {
      font-size: 16px;
      color: #41454d;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .hero .btn-group {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .btn-primary {
      display: inline-block;
      background-color: #181d26;
      color: #ffffff;
      border: none;
      border-radius: 12px;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .btn-primary:hover {
      background-color: #0d1218;
    }
    .btn-secondary {
      display: inline-block;
      background-color: #ffffff;
      color: #181d26;
      border: 1px solid #dddddd;
      border-radius: 12px;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-secondary:hover {
      background-color: #f8fafc;
    }
    .signature-card {
      background-color: #aa2d00;
      color: #ffffff;
      padding: 32px 24px;
      margin: 0 16px;
      border-radius: 12px;
      text-align: center;
    }
    .signature-card h2 {
      font-size: 24px;
      font-weight: 400;
      margin-bottom: 8px;
    }
    .signature-card p {
      font-size: 14px;
      opacity: 0.8;
    }
    .stats-bar {
      display: flex;
      justify-content: space-around;
      padding: 24px 16px;
      background-color: #f8fafc;
    }
    .stat-item {
      text-align: center;
    }
    .stat-item .value {
      font-size: 20px;
      font-weight: 600;
      color: #181d26;
    }
    .stat-item .label {
      font-size: 12px;
      color: #41454d;
      margin-top: 4px;
    }
    .section {
      padding: 48px 16px;
    }
    .section-title {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 24px;
      font-weight: 400;
      color: #181d26;
      margin-bottom: 20px;
      letter-spacing: -0.5px;
    }
    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      overflow-x: auto;
      padding-bottom: 8px;
    }
    .tab {
      flex-shrink: 0;
      padding: 10px 16px;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      background-color: #f8fafc;
      color: #333840;
      border: 1px solid #dddddd;
    }
    .tab.active {
      background-color: #181d26;
      color: #ffffff;
      border-color: #181d26;
    }
    .tab:hover:not(.active) {
      background-color: #e0e2e6;
    }
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    .tool-card {
      background-color: #f5e9d4;
      border-radius: 10px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tool-card:hover {
      background-color: #efe3cc;
    }
    .tool-card.peach { background-color: #fcab79; }
    .tool-card.mint { background-color: #a8d8c4; }
    .tool-card.yellow { background-color: #f4d35e; }
    .tool-card .icon {
      font-size: 32px;
      margin-bottom: 12px;
      display: block;
    }
    .tool-card .name {
      font-size: 16px;
      font-weight: 500;
      color: #181d26;
      margin-bottom: 4px;
    }
    .tool-card .desc {
      font-size: 14px;
      color: #41454d;
      line-height: 1.4;
    }
    .tool-card .badge {
      display: inline-block;
      background-color: rgba(255,255,255,0.8);
      color: #aa2d00;
      border-radius: 9999px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      margin-top: 8px;
    }
    .quick-actions {
      padding: 0 16px 32px;
    }
    .action-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background-color: #f8fafc;
      border-radius: 10px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-item:hover {
      background-color: #e0e2e6;
    }
    .action-item .left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .action-item .icon {
      font-size: 24px;
    }
    .action-item .text {
      font-size: 16px;
      font-weight: 500;
      color: #181d26;
    }
    .action-item .arrow {
      color: #41454d;
      font-size: 20px;
    }
    .footer {
      text-align: center;
      padding: 24px 16px;
      font-size: 12px;
      color: #999999;
      background-color: #f8fafc;
    }
  </style>
</head>
<body>
  <!-- Hero Section -->
  <div class="hero">
    <h1>刷个冯题</h1>
    <p>你的 CS 学习工具箱</p>
    <div class="btn-group">
      <button class="btn-primary">开始刷题</button>
      <button class="btn-secondary">了解更多</button>
    </div>
  </div>

  <!-- Signature Card -->
  <div class="signature-card">
    <h2>高效学习，从工具开始</h2>
    <p>7 个专业工具，覆盖计算机科学核心领域</p>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-item">
      <div class="value">328</div>
      <div class="label">累计刷题</div>
    </div>
    <div class="stat-item">
      <div class="value">47</div>
      <div class="label">练习次数</div>
    </div>
    <div class="stat-item">
      <div class="value">82%</div>
      <div class="label">正确率</div>
    </div>
    <div class="stat-item">
      <div class="value">12</div>
      <div class="label">错题数</div>
    </div>
  </div>

  <!-- Toolbox Section -->
  <div class="section">
    <h2 class="section-title">工具箱</h2>
    <div class="tabs">
      <div class="tab active">全部工具</div>
      <div class="tab">计算机网络</div>
      <div class="tab">算法&数据结构</div>
    </div>
    <div class="tools-grid">
      <div class="tool-card">
        <span class="icon">🌐</span>
        <div class="name">子网计算器</div>
        <div class="desc">快速计算子网划分</div>
      </div>
      <div class="tool-card peach">
        <span class="icon">🔗</span>
        <div class="name">TCP 动画机</div>
        <div class="desc">可视化 TCP 连接过程</div>
      </div>
      <div class="tool-card mint">
        <span class="icon">📊</span>
        <div class="name">排序可视化</div>
        <div class="desc">直观理解排序算法</div>
      </div>
      <div class="tool-card yellow">
        <span class="icon">🌲</span>
        <div class="name">数据结构可视化</div>
        <div class="desc">BST、栈、队列等</div>
      </div>
      <div class="tool-card">
        <span class="icon">📈</span>
        <div class="name">学习驾驶舱</div>
        <div class="desc">学习进度一目了然</div>
      </div>
      <div class="tool-card peach">
        <span class="icon">📝</span>
        <div class="name">单词记忆</div>
        <div class="desc">CS 专业词汇速记</div>
        <span class="badge">即将上线</span>
      </div>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="quick-actions">
    <div class="action-item">
      <div class="left">
        <span class="icon">📋</span>
        <span class="text">答题记录</span>
      </div>
      <span class="arrow">→</span>
    </div>
    <div class="action-item">
      <div class="left">
        <span class="icon">❌</span>
        <span class="text">错题本</span>
      </div>
      <span class="arrow">→</span>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    设计方案基于 Airtable 设计语言 · 仅供预览
  </div>
</body>
</html>
