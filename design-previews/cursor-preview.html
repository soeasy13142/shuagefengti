<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>刷个冯题 - Cursor 设计方案</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f7f7f4;
      color: #26251e;
      min-height: 100vh;
      max-width: 375px;
      margin: 0 auto;
      overflow-x: hidden;
    }
    .hero {
      padding: 80px 32px;
      text-align: center;
      background-color: #f7f7f4;
    }
    .hero h1 {
      font-size: 40px;
      font-weight: 400;
      color: #26251e;
      margin-bottom: 12px;
      letter-spacing: -1px;
    }
    .hero p {
      font-size: 16px;
      color: #5a5852;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .btn-primary {
      display: inline-block;
      background-color: #f54e00;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 14px 28px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .btn-primary:hover {
      background-color: #d94400;
    }
    .stats-bar {
      display: flex;
      justify-content: space-around;
      padding: 24px 16px;
      background-color: #ffffff;
      border-top: 1px solid #e6e5e0;
      border-bottom: 1px solid #e6e5e0;
    }
    .stat-item {
      text-align: center;
    }
    .stat-item .value {
      font-size: 24px;
      font-weight: 500;
      color: #26251e;
    }
    .stat-item .label {
      font-size: 12px;
      color: #807d72;
      margin-top: 4px;
    }
    .section {
      padding: 48px 16px;
      background-color: #f7f7f4;
    }
    .section-title {
      font-size: 28px;
      font-weight: 400;
      color: #26251e;
      margin-bottom: 20px;
      letter-spacing: -0.5px;
    }
    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      overflow-x: auto;
      padding-bottom: 8px;
    }
    .tab {
      flex-shrink: 0;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      background-color: #ffffff;
      color: #26251e;
      border: 1px solid #e6e5e0;
    }
    .tab.active {
      background-color: #26251e;
      color: #f7f7f4;
      border-color: #26251e;
    }
    .tab:hover:not(.active) {
      background-color: #e6e5e0;
    }
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    .tool-card {
      background-color: #ffffff;
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid #e6e5e0;
    }
    .tool-card:hover {
      background-color: #fafaf7;
    }
    .tool-card .icon {
      font-size: 32px;
      margin-bottom: 12px;
      display: block;
    }
    .tool-card .name {
      font-size: 16px;
      font-weight: 500;
      color: #26251e;
      margin-bottom: 4px;
    }
    .tool-card .desc {
      font-size: 14px;
      color: #5a5852;
      line-height: 1.4;
    }
    .tool-card .badge {
      display: inline-block;
      background-color: #f54e00;
      color: #ffffff;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      margin-top: 8px;
    }
    .timeline {
      display: flex;
      gap: 8px;
      margin: 24px 16px;
      padding: 16px;
      background-color: #ffffff;
      border-radius: 12px;
      border: 1px solid #e6e5e0;
      overflow-x: auto;
    }
    .timeline-pill {
      flex-shrink: 0;
      padding: 8px 16px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 500;
    }
    .timeline-pill.thinking { background-color: #dfa88f; color: #26251e; }
    .timeline-pill.grep { background-color: #9fc9a2; color: #26251e; }
    .timeline-pill.read { background-color: #9fbbe0; color: #26251e; }
    .timeline-pill.edit { background-color: #c0a8dd; color: #26251e; }
    .timeline-pill.done { background-color: #c08532; color: #ffffff; }
    .quick-actions {
      padding: 0 16px 32px;
      background-color: #f7f7f4;
    }
    .action-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background-color: #ffffff;
      border-radius: 12px;
      border: 1px solid #e6e5e0;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-item:hover {
      background-color: #fafaf7;
    }
    .action-item .left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .action-item .icon {
      font-size: 24px;
    }
    .action-item .text {
      font-size: 16px;
      font-weight: 500;
      color: #26251e;
    }
    .action-item .arrow {
      color: #807d72;
      font-size: 20px;
    }
    .footer {
      text-align: center;
      padding: 24px 16px;
      font-size: 12px;
      color: #807d72;
      background-color: #ffffff;
      border-top: 1px solid #e6e5e0;
    }
  </style>
</head>
<body>
  <!-- Hero Section -->
  <div class="hero">
    <h1>刷个冯题</h1>
    <p>你的 CS 学习工具箱</p>
    <button class="btn-primary">开始刷题</button>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-item">
      <div class="value">328</div>
      <div class="label">累计刷题</div>
    </div>
    <div class="stat-item">
      <div class="value">47</div>
      <div class="label">练习次数</div>
    </div>
    <div class="stat-item">
      <div class="value">82%</div>
      <div class="label">正确率</div>
    </div>
    <div class="stat-item">
      <div class="value">12</div>
      <div class="label">错题数</div>
    </div>
  </div>

  <!-- Toolbox Section -->
  <div class="section">
    <h2 class="section-title">工具箱</h2>
    <div class="tabs">
      <div class="tab active">全部工具</div>
      <div class="tab">计算机网络</div>
      <div class="tab">算法&数据结构</div>
    </div>
    <div class="tools-grid">
      <div class="tool-card">
        <span class="icon">🌐</span>
        <div class="name">子网计算器</div>
        <div class="desc">快速计算子网划分</div>
      </div>
      <div class="tool-card">
        <span class="icon">🔗</span>
        <div class="name">TCP 动画机</div>
        <div class="desc">可视化 TCP 连接过程</div>
      </div>
      <div class="tool-card">
        <span class="icon">📊</span>
        <div class="name">排序可视化</div>
        <div class="desc">直观理解排序算法</div>
      </div>
      <div class="tool-card">
        <span class="icon">🌲</span>
        <div class="name">数据结构可视化</div>
        <div class="desc">BST、栈、队列等</div>
      </div>
      <div class="tool-card">
        <span class="icon">📈</span>
        <div class="name">学习驾驶舱</div>
        <div class="desc">学习进度一目了然</div>
      </div>
      <div class="tool-card">
        <span class="icon">📝</span>
        <div class="name">单词记忆</div>
        <div class="desc">CS 专业词汇速记</div>
        <span class="badge">即将上线</span>
      </div>
    </div>
  </div>

  <!-- Timeline -->
  <div class="timeline">
    <div class="timeline-pill thinking">思考中</div>
    <div class="timeline-pill grep">搜索</div>
    <div class="timeline-pill read">阅读</div>
    <div class="timeline-pill edit">编辑</div>
    <div class="timeline-pill done">完成</div>
  </div>

  <!-- Quick Actions -->
  <div class="quick-actions">
    <div class="action-item">
      <div class="left">
        <span class="icon">📋</span>
        <span class="text">答题记录</span>
      </div>
      <span class="arrow">→</span>
    </div>
    <div class="action-item">
      <div class="left">
        <span class="icon">❌</span>
        <span class="text">错题本</span>
      </div>
      <span class="arrow">→</span>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    设计方案基于 Cursor 设计语言 · 仅供预览
  </div>
</body>
</html>
