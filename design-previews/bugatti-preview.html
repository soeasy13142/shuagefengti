<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>刷个冯题 - Bugatti 设计方案</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Georgia, 'Times New Roman', serif;
      background-color: #000000;
      color: #cccccc;
      min-height: 100vh;
      max-width: 375px;
      margin: 0 auto;
      overflow-x: hidden;
    }
    .hero {
      padding: 120px 32px;
      text-align: center;
      background-color: #000000;
    }
    .hero h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 48px;
      font-weight: 400;
      color: #ffffff;
      margin-bottom: 16px;
      letter-spacing: 3px;
      text-transform: uppercase;
      line-height: 1.1;
    }
    .hero p {
      font-size: 16px;
      color: #999999;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .btn-pill {
      display: inline-block;
      background-color: transparent;
      color: #ffffff;
      border: 1px solid #ffffff;
      border-radius: 9999px;
      padding: 14px 40px;
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      font-family: 'Courier New', monospace;
    }
    .btn-pill:hover {
      background-color: #ffffff;
      color: #000000;
    }
    .stats-bar {
      display: flex;
      justify-content: space-around;
      padding: 32px 16px;
      background-color: #0d0d0d;
      border-top: 1px solid #262626;
      border-bottom: 1px solid #262626;
    }
    .stat-item {
      text-align: center;
    }
    .stat-item .value {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 28px;
      font-weight: 400;
      color: #ffffff;
    }
    .stat-item .label {
      font-size: 11px;
      color: #666666;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-family: 'Courier New', monospace;
    }
    .section {
      padding: 60px 16px;
      background-color: #000000;
    }
    .section-title {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 32px;
      font-weight: 400;
      color: #ffffff;
      margin-bottom: 24px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .tabs {
      display: flex;
      gap: 24px;
      margin-bottom: 24px;
      overflow-x: auto;
      padding-bottom: 12px;
      border-bottom: 1px solid #262626;
    }
    .tab {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 400;
      cursor: pointer;
      transition: all 0.2s;
      color: #666666;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-family: 'Courier New', monospace;
      padding-bottom: 8px;
    }
    .tab.active {
      color: #ffffff;
    }
    .tab:hover:not(.active) {
      color: #cccccc;
    }
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    .tool-card {
      background-color: #141414;
      border-radius: 0;
      padding: 24px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tool-card:hover {
      background-color: #1f1f1f;
    }
    .tool-card .icon {
      font-size: 32px;
      margin-bottom: 16px;
      display: block;
    }
    .tool-card .name {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 18px;
      font-weight: 400;
      color: #ffffff;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }
    .tool-card .desc {
      font-size: 14px;
      color: #999999;
      line-height: 1.5;
    }
    .tool-card .badge {
      display: inline-block;
      background-color: transparent;
      color: #c3d9f3;
      border: 1px solid #c3d9f3;
      border-radius: 9999px;
      padding: 4px 12px;
      font-size: 10px;
      font-weight: 400;
      margin-top: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-family: 'Courier New', monospace;
    }
    .quick-actions {
      padding: 0 16px 32px;
      background-color: #000000;
    }
    .action-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      background-color: #141414;
      border-radius: 0;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
      border-bottom: 1px solid #262626;
    }
    .action-item:hover {
      background-color: #1f1f1f;
    }
    .action-item .left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .action-item .icon {
      font-size: 24px;
    }
    .action-item .text {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      font-weight: 400;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .action-item .arrow {
      color: #666666;
      font-size: 20px;
    }
    .footer {
      text-align: center;
      padding: 32px 16px;
      font-size: 11px;
      color: #666666;
      background-color: #000000;
      border-top: 1px solid #262626;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>
  <!-- Hero Section -->
  <div class="hero">
    <h1>刷个冯题</h1>
    <p>你的 CS 学习工具箱</p>
    <button class="btn-pill">开始刷题</button>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-item">
      <div class="value">328</div>
      <div class="label">累计刷题</div>
    </div>
    <div class="stat-item">
      <div class="value">47</div>
      <div class="label">练习次数</div>
    </div>
    <div class="stat-item">
      <div class="value">82%</div>
      <div class="label">正确率</div>
    </div>
    <div class="stat-item">
      <div class="value">12</div>
      <div class="label">错题数</div>
    </div>
  </div>

  <!-- Toolbox Section -->
  <div class="section">
    <h2 class="section-title">工具箱</h2>
    <div class="tabs">
      <div class="tab active">全部工具</div>
      <div class="tab">计算机网络</div>
      <div class="tab">算法&数据结构</div>
    </div>
    <div class="tools-grid">
      <div class="tool-card">
        <span class="icon">🌐</span>
        <div class="name">子网计算器</div>
        <div class="desc">快速计算子网划分</div>
      </div>
      <div class="tool-card">
        <span class="icon">🔗</span>
        <div class="name">TCP 动画机</div>
        <div class="desc">可视化 TCP 连接过程</div>
      </div>
      <div class="tool-card">
        <span class="icon">📊</span>
        <div class="name">排序可视化</div>
        <div class="desc">直观理解排序算法</div>
      </div>
      <div class="tool-card">
        <span class="icon">🌲</span>
        <div class="name">数据结构可视化</div>
        <div class="desc">BST、栈、队列等</div>
      </div>
      <div class="tool-card">
        <span class="icon">📈</span>
        <div class="name">学习驾驶舱</div>
        <div class="desc">学习进度一目了然</div>
      </div>
      <div class="tool-card">
        <span class="icon">📝</span>
        <div class="name">单词记忆</div>
        <div class="desc">CS 专业词汇速记</div>
        <span class="badge">即将上线</span>
      </div>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="quick-actions">
    <div class="action-item">
      <div class="left">
        <span class="icon">📋</span>
        <span class="text">答题记录</span>
      </div>
      <span class="arrow">→</span>
    </div>
    <div class="action-item">
      <div class="left">
        <span class="icon">❌</span>
        <span class="text">错题本</span>
      </div>
      <span class="arrow">→</span>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    设计方案基于 Bugatti 设计语言 · 仅供预览
  </div>
</body>
</html>
