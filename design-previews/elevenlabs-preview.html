<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>刷个冯题 - ElevenLabs 设计方案</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Georgia, 'Times New Roman', serif;
      background-color: #f5f5f5;
      color: #0c0a09;
      min-height: 100vh;
      max-width: 375px;
      margin: 0 auto;
      overflow-x: hidden;
    }
    .hero {
      padding: 96px 32px;
      text-align: center;
      background-color: #f5f5f5;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -50px;
      right: -50px;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, #a7e5d3 0%, transparent 70%);
      opacity: 0.5;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: -50px;
      left: -50px;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, #f4c5a8 0%, transparent 70%);
      opacity: 0.5;
    }
    .hero h1 {
      font-size: 48px;
      font-weight: 300;
      color: #0c0a09;
      margin-bottom: 16px;
      letter-spacing: -1px;
      position: relative;
      z-index: 1;
    }
    .hero p {
      font-size: 16px;
      color: #4e4e4e;
      margin-bottom: 32px;
      line-height: 1.5;
      position: relative;
      z-index: 1;
    }
    .btn-pill {
      display: inline-block;
      background-color: #292524;
      color: #ffffff;
      border: none;
      border-radius: 9999px;
      padding: 14px 32px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
      position: relative;
      z-index: 1;
    }
    .btn-pill:hover {
      background-color: #3d3935;
    }
    .stats-bar {
      display: flex;
      justify-content: space-around;
      padding: 32px 16px;
      background-color: #ffffff;
      border-top: 1px solid #e7e5e4;
      border-bottom: 1px solid #e7e5e4;
    }
    .stat-item {
      text-align: center;
    }
    .stat-item .value {
      font-size: 28px;
      font-weight: 300;
      color: #0c0a09;
    }
    .stat-item .label {
      font-size: 12px;
      color: #777169;
      margin-top: 4px;
    }
    .section {
      padding: 48px 16px;
      background-color: #f5f5f5;
    }
    .section-title {
      font-size: 32px;
      font-weight: 300;
      color: #0c0a09;
      margin-bottom: 24px;
      letter-spacing: -0.5px;
    }
    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      overflow-x: auto;
      padding-bottom: 8px;
    }
    .tab {
      flex-shrink: 0;
      padding: 10px 20px;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      background-color: #ffffff;
      color: #0c0a09;
      border: 1px solid #e7e5e4;
    }
    .tab.active {
      background-color: #292524;
      color: #ffffff;
      border-color: #292524;
    }
    .tab:hover:not(.active) {
      background-color: #e7e5e4;
    }
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    .tool-card {
      background-color: #ffffff;
      border-radius: 16px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid #e7e5e4;
      position: relative;
      overflow: hidden;
    }
    .tool-card::before {
      content: '';
      position: absolute;
      top: -20px;
      right: -20px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      opacity: 0.15;
    }
    .tool-card:nth-child(1)::before { background-color: #a7e5d3; }
    .tool-card:nth-child(2)::before { background-color: #f4c5a8; }
    .tool-card:nth-child(3)::before { background-color: #c8b8e9; }
    .tool-card:nth-child(4)::before { background-color: #9fc5e8; }
    .tool-card:nth-child(5)::before { background-color: #f4a7b9; }
    .tool-card:nth-child(6)::before { background-color: #a7e5d3; }
    .tool-card:hover {
      background-color: #fafafa;
    }
    .tool-card .icon {
      font-size: 32px;
      margin-bottom: 12px;
      display: block;
      position: relative;
      z-index: 1;
    }
    .tool-card .name {
      font-size: 18px;
      font-weight: 300;
      color: #0c0a09;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }
    .tool-card .desc {
      font-size: 14px;
      color: #4e4e4e;
      line-height: 1.5;
      position: relative;
      z-index: 1;
    }
    .tool-card .badge {
      display: inline-block;
      background-color: #292524;
      color: #ffffff;
      border-radius: 9999px;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 500;
      margin-top: 12px;
      position: relative;
      z-index: 1;
    }
    .quick-actions {
      padding: 0 16px 32px;
      background-color: #f5f5f5;
    }
    .action-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      background-color: #ffffff;
      border-radius: 16px;
      border: 1px solid #e7e5e4;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-item:hover {
      background-color: #fafafa;
    }
    .action-item .left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .action-item .icon {
      font-size: 24px;
    }
    .action-item .text {
      font-size: 16px;
      font-weight: 400;
      color: #0c0a09;
    }
    .action-item .arrow {
      color: #777169;
      font-size: 20px;
    }
    .footer {
      text-align: center;
      padding: 32px 16px;
      font-size: 12px;
      color: #777169;
      background-color: #ffffff;
      border-top: 1px solid #e7e5e4;
    }
  </style>
</head>
<body>
  <!-- Hero Section -->
  <div class="hero">
    <h1>刷个冯题</h1>
    <p>你的 CS 学习工具箱</p>
    <button class="btn-pill">开始刷题</button>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-item">
      <div class="value">328</div>
      <div class="label">累计刷题</div>
    </div>
    <div class="stat-item">
      <div class="value">47</div>
      <div class="label">练习次数</div>
    </div>
    <div class="stat-item">
      <div class="value">82%</div>
      <div class="label">正确率</div>
    </div>
    <div class="stat-item">
      <div class="value">12</div>
      <div class="label">错题数</div>
    </div>
  </div>

  <!-- Toolbox Section -->
  <div class="section">
    <h2 class="section-title">工具箱</h2>
    <div class="tabs">
      <div class="tab active">全部工具</div>
      <div class="tab">计算机网络</div>
      <div class="tab">算法&数据结构</div>
    </div>
    <div class="tools-grid">
      <div class="tool-card">
        <span class="icon">🌐</span>
        <div class="name">子网计算器</div>
        <div class="desc">快速计算子网划分</div>
      </div>
      <div class="tool-card">
        <span class="icon">🔗</span>
        <div class="name">TCP 动画机</div>
        <div class="desc">可视化 TCP 连接过程</div>
      </div>
      <div class="tool-card">
        <span class="icon">📊</span>
        <div class="name">排序可视化</div>
        <div class="desc">直观理解排序算法</div>
      </div>
      <div class="tool-card">
        <span class="icon">🌲</span>
        <div class="name">数据结构可视化</div>
        <div class="desc">BST、栈、队列等</div>
      </div>
      <div class="tool-card">
        <span class="icon">📈</span>
        <div class="name">学习驾驶舱</div>
        <div class="desc">学习进度一目了然</div>
      </div>
      <div class="tool-card">
        <span class="icon">📝</span>
        <div class="name">单词记忆</div>
        <div class="desc">CS 专业词汇速记</div>
        <span class="badge">即将上线</span>
      </div>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="quick-actions">
    <div class="action-item">
      <div class="left">
        <span class="icon">📋</span>
        <span class="text">答题记录</span>
      </div>
      <span class="arrow">→</span>
    </div>
    <div class="action-item">
      <div class="left">
        <span class="icon">❌</span>
        <span class="text">错题本</span>
      </div>
      <span class="arrow">→</span>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    设计方案基于 ElevenLabs 设计语言 · 仅供预览
  </div>
</body>
</html>
